// computePicture (vera-v3-picture.js)
// ═══════════════════════════════════════════════════════

      amount: e.amountFormatted || M(e.amountCents),
      spent: e.spentFormatted || M(e.spentCents),
      funded: e.fundedCents > 0 ? (e.fundedFormatted || M(e.fundedCents)) : undefined,
      target: e.targetCents ? (e.targetFormatted || M(e.targetCents)) : undefined,
      isDue: e.isDue || false, next: e.nextDate,
      interval: e.intervalDays, priority: e.priority,
    })),
    due: (pic.dueEnvelopes || []),
    upcoming: (pic.upcomingEnvelopes || []).map(e => ({ name: e.name, amount: e.amountFormatted, days: e.daysUntilDue })),
    savings: pic.totalSavedCents > 0 ? M(pic.totalSavedCents) : undefined,
    recentTx: (state.transactions || []).slice(-10).reverse().map(tx => ({
      id: tx.id, type: tx.type, amount: M(tx.amountCents),
      desc: tx.description, envelope: tx.envelope, date: tx.date,
    })),
    cycleStats: pic.cycleStats || null,
    insights: (() => {
      const ins = [];
      const ru = (state.language || "en") === "ru";
      for (const e of (pic.envelopes || [])) {
        if (["daily","weekly","monthly","on_income"].includes(e.rhythm) && e.amountCents > 0) {
          const pct = Math.round((e.spentCents / e.amountCents) * 100);
          if (pct >= 100) ins.push(ru ? (e.name + " — перерасход (" + pct + "%)") : (e.name + " is over budget (" + pct + "% spent)"));
          else if (pct >= 70) ins.push(ru ? (e.name + " уже на " + pct + "%") : (e.name + " is at " + pct + "% of budget"));
        }
      }
      if (pic.freeCents != null && pic.freeCents < 0) ins.push(ru ? "Перерасход — свободных денег нет" : "Over budget — free is negative");
      return ins.length > 0 ? ins : undefined;
    })(),
  });
  const lang = state.language || "en";
  const isRu = lang === "ru";
  const lines = [
    "You are SpendYes — a spending confidence engine.",
    "LANGUAGE: The user's language is " + (isRu ? "Russian. ALWAYS respond in Russian. Use ты, not вы. Be casual and natural — как друг, не как банк." : "English."),
    "NEVER translate — think and write natively in the user's language.",
    "VOICE-FIRST: This is a voice-first Telegram bot.",
    isRu ? "Russian voice transcripts especially: 'тыщ' = тысяч, 'пятихатка' = 500, 'косарь' = 1000, 'штука' = 1000, 'лям' = миллион." : "",
    "STATE:", snap, "TODAY: " + v3.today(state.timezone || "UTC"),
    "== IF NOT SET UP ==",
    isRu ? "НЕ допрашивай. Просто скажи тепло: 'Привет! Зажми микрофон и расскажи про деньги...'" : "DO NOT interrogate them. Say: 'Hey! Just hold the mic and tell me about your money...'",
    "  'I get paid on the 15th' -> payday: next 15th, payFrequency: 'monthly'",
    "  'every two weeks' -> payFrequency: 'biweekly'",
    "  'weekly' -> payFrequency: 'weekly'",
    isRu ? "  'я фрилансер' / 'доход нерегулярный' -> payFrequency: 'irregular'" : "  'I'm freelance' / 'irregular income' -> payFrequency: 'irregular'",
    "  IRREGULAR INCOME: If payFrequency is 'irregular', the system auto-extends the spending horizon.",
    "CRITICAL — FOLLOW UP ABOUT BILLS:",
    isRu ? "'Понял — X на счету. Есть регулярные траты?'" : "'Got it — $X. Got any bills coming up?'",
    "== IF SET UP ==",
    isRu ? "Записывай траты, управляй конвертами." : "Log spending, manage envelopes.",
    "CONTEXTUAL AWARENESS:",
    isRu ? "Ты не логгер трат." : "You're not a logging tool.",
    isRu ? "'Записал. Кстати, завтра телефон — 600₽.'" : "'Got it. Oh heads up — phone bill is due tomorrow, $60.'",
    isRu ? "'зарплата пришла' -> income." : "'got paid' -> income action.",
    isRu ? "'удали последнее' -> delete_spend" : "'delete the last thing' -> delete_spend",
    isRu ? "'Нашёл кофе за ₽400 сегодня — поменять на ₽250?'" : "'I found a $40 coffee from today — change it to $14?'",
    "ADJUSTMENTS — SETTINGS CAN CHANGE ANYTIME:",
    "update_settings: timezone, currency, symbol, payday, payFrequency, language",
    isRu ? "'переименуй продукты в еда' -> rename_envelope" : "'rename groceries to food' -> rename_envelope",
    isRu ? "КАЖДЫЙ ответ после изменения: *Сегодня: X₽*" : "EVERY response after change: *Free today: $X*",
    "ACTIONS:",
    "setup: balanceUSD, payday(YYYY-MM-DD), payFrequency(weekly/biweekly/monthly/irregular — IMPORTANT: set this!), currency, symbol, timezone(IANA)",
    "update_settings: timezone, currency, symbol, payday, payFrequency, language",
    "create_envelope: name, amountUSD, rhythm, intervalDays, nextDate, keywords, targetUSD, fundRate, fundAmountUSD, priority",
    "update_envelope: name, amountUSD, addFundedUSD, keywords, rhythm, priority, active, nextDate",
    "rename_envelope: oldName, newName",
    "remove_envelope: name",
    "spend: amountUSD, description, envelope",
    "pay_envelope: name, amountUSD",
    "skip_envelope: name",
    "income: amountUSD, description, nextPayday, payFrequency",
    isRu ? "  Для фрилансеров: когда paydayOverdue=true, спроси 'Деньги пришли?'" : "  For freelancers: when paydayOverdue=true, ask 'Any money come in?'",
    "fund_envelope: name, amountUSD",
    "correction: balanceUSD",
    "edit_spend: txId, newAmountUSD, newDescription",
    "delete_spend: txId",
    "undo: (no data)", "reset: (no data)",
    '{"message":"...","actions":[{"type":"...","data":{}}],"queries":[],"verify":false}',
  ];
  return lines.join("\n");
}

const logEl = document.getElementById("log");
const summaryEl = document.getElementById("summary");
let passed = 0, failed = 0;
const failures = [];

function log(html) { logEl.innerHTML += html + "\n"; }
function section(name) { log('<span class="section">' + name + '</span>'); }

function test(name, fn) {
  try {
    fn();
    passed++;
    log('<span class="pass">  ✓</span> ' + name);
  } catch (err) {
    failed++;
    failures.push({ name, err });
    log('<span class="fail">  ✗</span> ' + name);
    log('<span class="fail-detail">    ' + err.message + '</span>');
  }
}

function assert_strictEqual(a, b, msg) {
  if (a !== b) throw new Error((msg || "") + " Expected " + JSON.stringify(b) + ", got " + JSON.stringify(a));
}
function assert_ok(val, msg) {
  if (!val) throw new Error(msg || "Expected truthy, got " + val);
}
function assert_deepStrictEqual(a, b, msg) {
  if (JSON.stringify(a) !== JSON.stringify(b)) throw new Error((msg || "") + " Expected " + JSON.stringify(b) + ", got " + JSON.stringify(a));
}
function assert_notStrictEqual(a, b, msg) {
  if (a === b) throw new Error((msg || "") + " Expected NOT " + JSON.stringify(b));
}

function futureDate(days) { const d = new Date(v3.today() + "T00:00:00Z"); d.setUTCDate(d.getUTCDate() + days); return d.toISOString().slice(0, 10); }
function pastDate(days) { const d = new Date(v3.today() + "T00:00:00Z"); d.setUTCDate(d.getUTCDate() - days); return d.toISOString().slice(0, 10); }

function setupState(overrides) {
  let s = v3.createFreshState();
  s = v3.applyAction(s, { type: "setup", data: { balanceUSD: 1000, payday: futureDate(30) } });
  if (overrides) Object.assign(s, overrides);
  return s;
}

function checkEquation(s, label) {
  const pic = computePicture(s);
  if (!pic.setup) return;
  const lhs = pic.balanceCents;
  const rhs = pic.totalReservedCents + pic.freeCents;
  assert_strictEqual(lhs, rhs, label + ": balance != reserves + free");
  assert_strictEqual(pic.checksumOk, true, label + ": checksumOk");
}

test("delete_spend: removes tx, restores balance", () => {
  let s = setupState(); s = v3.applyAction(s, { type: "spend", data: { amountUSD: 25, description: "movie" } });
  const txId = s.transactions.find(t => t.description === "movie").id;

});

  let s = setupState();
  s = v3.applyAction(s, { type: "create_envelope", data: { name: "Food", amountUSD: 50, rhythm: "daily", keywords: ["food"] } });

section("--- Cycle / Payday Logic ---");

test("advancePayday: monthly", () => {
  const past = pastDate(5); const r = v3.advancePayday(past, "monthly");
  const todayMs = new Date(v3.today() + "T00:00:00Z");
  assert_ok(new Date(r + "T00:00:00Z") > todayMs, "future: " + r);
  assert_strictEqual(new Date(r + "T00:00:00Z").getUTCDate(), new Date(past + "T00:00:00Z").getUTCDate());
});
test("advancePayday: biweekly", () => {
  const r = v3.advancePayday(pastDate(3), "biweekly");
  const todayMs = new Date(v3.today() + "T00:00:00Z");
  assert_ok(new Date(r + "T00:00:00Z") > todayMs, "future");
  const d = Math.round((new Date(r + "T00:00:00Z") - todayMs) / 86400000);
  assert_ok(d >= 10 && d <= 12, "~11 days: " + d);
});
test("advancePayday: weekly", () => {
  const r = v3.advancePayday(pastDate(2), "weekly");
  const todayMs = new Date(v3.today() + "T00:00:00Z");
  const d = Math.round((new Date(r + "T00:00:00Z") - todayMs) / 86400000);
  assert_ok(d >= 4 && d <= 6, "~5 days: " + d);
});
test("advancePayday: future unchanged", () => {
  const f = futureDate(10); assert_strictEqual(v3.advancePayday(f, "monthly"), f);
});
test("income auto-advances payday", () => {
  let s = setupState(); s.payFrequency = "monthly"; s.payday = pastDate(2); const old = s.payday;
  s = v3.applyAction(s, { type: "income", data: { amountUSD: 5000 } });
  assert_notStrictEqual(s.payday, old, "Payday should advance"); assert_ok(s.payday > v3.today(), "New payday in future");
});
test("income respects explicit nextPayday", () => {
  let s = setupState(); s.payFrequency = "biweekly"; const ex = futureDate(20);
  s = v3.applyAction(s, { type: "income", data: { amountUSD: 5000, nextPayday: ex } });
  assert_strictEqual(s.payday, ex);
});
test("setup stores payFrequency", () => {
  let s = v3.createFreshState();
  s = v3.applyAction(s, { type: "setup", data: { balanceUSD: 1000, payday: futureDate(14), payFrequency: "biweekly" } });
  assert_strictEqual(s.payFrequency, "biweekly");
});
test("createFreshState: payFrequency null", () => { assert_strictEqual(v3.createFreshState().payFrequency, null); });

section("--- Irregular Income & Payday Overdue ---");

test("advancePayday: irregular returns same date", () => {
  const past = pastDate(5); assert_strictEqual(v3.advancePayday(past, "irregular", "UTC"), past);
});
test("computePicture: irregular expired payday -> 30-day horizon", () => {
  let s = setupState(); s.payday = pastDate(3); s.payFrequency = "irregular";
  const pic = computePicture(s);
  assert_ok(pic.daysLeft >= 28 && pic.daysLeft <= 31, "~30 days: " + pic.daysLeft);
  assert_strictEqual(pic.paydayOverdue, true);
});
test("computePicture: monthly expired payday auto-advances", () => {
  let s = setupState(); s.payday = pastDate(5); s.payFrequency = "monthly";
  const pic = computePicture(s);
  assert_ok(pic.daysLeft > 1, "daysLeft: " + pic.daysLeft);
  assert_strictEqual(pic.paydayOverdue, true);
  assert_ok(pic.displayPayday > v3.today("UTC"), "displayPayday future: " + pic.displayPayday);
});
test("computePicture: future payday NOT overdue", () => {
  let s = setupState(); s.payday = futureDate(15);
  const pic = computePicture(s);
  assert_strictEqual(pic.paydayOverdue, false); assert_strictEqual(pic.daysLeft, 15);
});
test("computePicture: irregular dailyPace reasonable", () => {
  let s = setupState(); s.payday = pastDate(2); s.payFrequency = "irregular"; s.balanceCents = 300000;
  const pic = computePicture(s);
  assert_ok(pic.dailyPaceCents < 200000, "spread ~30 days: " + pic.dailyPaceCents);
  assert_ok(pic.dailyPaceCents > 0, "positive");
});
test("income with irregular: no auto-advance", () => {
  let s = setupState(); s.payFrequency = "irregular"; s.payday = pastDate(5); const orig = s.payday;
  s = v3.applyAction(s, { type: "income", data: { amountUSD: 2000 } });
  assert_strictEqual(s.payday, orig);
});
test("setup with irregular: payday 30 days out", () => {
  let s = v3.createFreshState();
  s = v3.applyAction(s, { type: "setup", data: { balanceUSD: 500, payFrequency: "irregular" } });
  assert_strictEqual(s.payFrequency, "irregular");
  const dl = v3.daysUntil(s.payday, "UTC");
  assert_ok(dl >= 29 && dl <= 31, "~30: " + dl);
});
test("prompt includes irregular", () => { assert_ok(buildSystemPrompt(setupState()).includes("irregular")); });
test("prompt includes paydayOverdue", () => {
  let s = setupState(); s.payday = pastDate(3); s.payFrequency = "irregular";
  assert_ok(buildSystemPrompt(s).includes("paydayOverdue"));
});
