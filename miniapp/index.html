<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0F0F0F">
  <title>SpendYes</title>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0F0F0F; color: #E8E4DF; overflow-x: hidden; }
    body { -webkit-tap-highlight-color: transparent; }
    #root { min-height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React 18 production (no Babel) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script>
    var tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#0F0F0F');
    tg.setBackgroundColor('#0F0F0F');

    // Extract user ID: prefer initDataUnsafe, fall back to parsing initData string
    var _tgUserId = tg.initDataUnsafe?.user?.id;
    if (!_tgUserId && tg.initData) {
      try {
        var _params = new URLSearchParams(tg.initData);
        var _userStr = _params.get('user');
        if (_userStr) {
          var _parsed = JSON.parse(_userStr);
          _tgUserId = _parsed.id;
        }
      } catch (e) {
        console.warn('[SpendYes] Failed to parse initData user:', e);
      }
    }
    window.TELEGRAM_USER_ID = _tgUserId || 'dev';
    window.TELEGRAM_USER_NAME = tg.initDataUnsafe?.user?.first_name || 'User';
    window.TG_INIT_DATA = tg.initData || '';
    console.log('[SpendYes] user_id=' + window.TELEGRAM_USER_ID + ' initData=' + (tg.initData ? tg.initData.slice(0, 40) + '...' : 'EMPTY'));
  </script>

  <script src="vera-tg.js"></script>
</body>
</html>
