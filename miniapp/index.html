<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0F0F0F">
  <title>SpendYes</title>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0F0F0F; color: #E8E4DF; overflow-x: hidden; }
    body { -webkit-tap-highlight-color: transparent; }
    #root { min-height: 100%; }
    /* Modal animations — used by TxDetailModal. Defined here so they're
       always available (component-level <style> only renders during the
       skeleton loader). */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React 18 production (no Babel) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script>
    // Snapshot Telegram WebApp state. The SDK populates initData synchronously
    // on a normal Mini App launch, but we re-read on retry in case of an odd
    // client. We also expose a refresh() helper for the React app to call.
    var tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
    if (tg) {
      try { tg.ready(); } catch (e) {}
      try { tg.expand(); } catch (e) {}
      try { tg.setHeaderColor('#0F0F0F'); } catch (e) {}
      try { tg.setBackgroundColor('#0F0F0F'); } catch (e) {}
    }

    function readTgUser() {
      if (!tg) return { id: null, name: null, initData: '' };
      var id = (tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user.id : null;
      var name = (tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user.first_name : null;
      var raw = tg.initData || '';
      if (!id && raw) {
        try {
          var p = new URLSearchParams(raw);
          var us = p.get('user');
          if (us) {
            var u = JSON.parse(us);
            id = u && u.id;
            name = name || (u && u.first_name);
          }
        } catch (e) {
          console.warn('[SpendYes] parse initData failed:', e && e.message);
        }
      }
      return { id: id || null, name: name || 'User', initData: raw };
    }

    function applyTg(snap) {
      window.TELEGRAM_USER_ID = snap.id || 'dev';
      window.TELEGRAM_USER_NAME = snap.name || 'User';
      window.TG_INIT_DATA = snap.initData || '';
    }

    applyTg(readTgUser());

    // Some Telegram clients (older Android, embedded webviews) populate
    // initData a beat after page load. Expose a helper the app can poll.
    window.refreshTgIdentity = function() {
      var snap = readTgUser();
      applyTg(snap);
      return snap;
    };

    window.TG_PLATFORM = tg ? (tg.platform || 'unknown') : 'no-sdk';
    window.TG_VERSION = tg ? (tg.version || 'unknown') : 'no-sdk';
    console.log('[SpendYes] platform=' + window.TG_PLATFORM + ' v=' + window.TG_VERSION
      + ' user_id=' + window.TELEGRAM_USER_ID
      + ' initData=' + (window.TG_INIT_DATA ? window.TG_INIT_DATA.length + ' bytes' : 'EMPTY'));
  </script>

  <script src="vera-v4.js"></script>
</body>
</html>
