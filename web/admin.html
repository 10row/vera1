<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SpendYes Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--card:#141b2d;--border:#1e293b;--text:#e2e8f0;--dim:#64748b;--accent:#3b82f6;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--purple:#8b5cf6}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* ── NAV ── */
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--card)}
.nav h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav .status{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--dim)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--dim)}
.dot.ok{background:var(--green)}
.dot.err{background:var(--red)}
.nav button{background:none;border:1px solid var(--border);border-radius:8px;color:var(--dim);padding:6px 14px;font-size:13px;cursor:pointer}
.nav button:hover{color:var(--text);border-color:var(--dim)}
/* ── GRID ── */
.dash{padding:24px 28px;display:grid;gap:20px;grid-template-columns:repeat(4,1fr)}
@media(max-width:1200px){.dash{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.dash{grid-template-columns:1fr;padding:16px}}
/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;overflow:hidden}
.card.wide{grid-column:span 2}
.card.full{grid-column:1/-1}
.card h2{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:14px;font-weight:600}
.big{font-size:32px;font-weight:700;line-height:1.1}
.big.green{color:var(--green)}.big.blue{color:var(--accent)}.big.purple{color:var(--purple)}.big.amber{color:var(--amber)}
.sub{font-size:13px;color:var(--dim);margin-top:4px}
/* ── METRIC ROW ── */
.metrics{display:flex;gap:20px;flex-wrap:wrap}
.metric{flex:1;min-width:80px}
.metric .val{font-size:20px;font-weight:700}
.metric .lbl{font-size:12px;color:var(--dim);margin-top:2px}
/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;color:var(--dim);font-weight:500;padding:8px 10px;border-bottom:1px solid var(--border)}
.tbl td{padding:8px 10px;border-bottom:1px solid #0f172a}
.tbl tr:hover td{background:#1a2235}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.badge.on{background:#10b98122;color:var(--green)}
.badge.off{background:#64748b22;color:var(--dim)}
/* ── BAR CHART ── */
.bars{display:flex;align-items:flex-end;gap:4px;height:100px;margin-top:10px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:4px 4px 0 0;background:var(--accent);min-height:2px;transition:height .4s}
.bar-lbl{font-size:10px;color:var(--dim)}
/* ── PROGRESS ── */
.prog-bg{height:8px;background:#1e293b;border-radius:4px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:4px;transition:width .4s}
/* ── REFRESH ── */
.refresh-bar{display:flex;align-items:center;justify-content:space-between;padding:0 28px}
.refresh-bar span{font-size:12px;color:var(--dim)}
.refresh-bar button{background:var(--accent);border:none;border-radius:8px;color:#fff;padding:6px 16px;font-size:12px;font-weight:600;cursor:pointer;margin:12px 0}
.refresh-bar button:hover{opacity:.85}
/* ── RANK LIST ── */
.rank{list-style:none;padding:0}
.rank li{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #0f172a;font-size:13px}
.rank li:last-child{border:none}
.rank .rk-name{color:var(--text)}.rank .rk-val{color:var(--dim);font-weight:600}
/* ── LOADING ── */
.loading{text-align:center;color:var(--dim);padding:40px;font-size:14px}
</style>
</head>
<body>
<nav class="nav">
  <h1>SpendYes Admin</h1>
  <div class="status"><div class="dot" id="hDot"></div><span id="hText">Checking...</span></div>
  <button onclick="logout()">Sign Out</button>
</nav>
<div class="refresh-bar">
  <span id="lastRefresh">Loading...</span>
  <button onclick="loadAll()">Refresh</button>
</div>
<div class="dash" id="dash"><div class="loading">Loading dashboard...</div></div>

<script>
const $ = s => document.querySelector(s);
const fmt = (n) => parseFloat(n).toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtI = (n) => parseInt(n).toLocaleString();

async function api(path) {
  const r = await fetch("/admin/api/" + path);
  if (r.status === 401 || r.redirected) { window.location.href = "/admin/login"; return null; }
  return r.json();
}
async function logout() {
  await fetch("/admin/logout", {method:"POST"});
  window.location.href = "/admin/login";
}

async function loadAll() {
  const [ov, costs, users, activity, fin, health] = await Promise.all([
    api("overview"), api("costs"), api("users"), api("activity?days=14"), api("financial"), api("health"),
  ]);
  if (!ov) return;
  renderHealth(health);
  renderDash(ov, costs, users, activity, fin);
  $("#lastRefresh").textContent = "Last refresh: " + new Date().toLocaleTimeString();
}

function renderHealth(h) {
  const dot = $("#hDot"), txt = $("#hText");
  if (h.db === "connected") { dot.className = "dot ok"; txt.textContent = "DB connected"; }
  else { dot.className = "dot err"; txt.textContent = "DB disconnected"; }
}

function renderDash(ov, costs, users, activity, fin) {
  let html = "";
  // Row 1: Overview KPIs
  html += kpiCard("Total Users", ov.totalUsers, "blue");
  html += kpiCard("Setup Complete", ov.setupUsers, "green", ov.setupRate + "% conversion");
  html += kpiCard("Active (7d)", ov.active7d, "purple");
  html += kpiCard("Active (30d)", ov.active30d, "amber");

  // Row 2: Cost overview
  html += `<div class="card wide"><h2>API Costs</h2><div class="metrics">
    <div class="metric"><div class="val green">$${costs.today.costUSD}</div><div class="lbl">Today (${fmtI(costs.today.calls)} calls)</div></div>
    <div class="metric"><div class="val blue">$${costs.week.costUSD}</div><div class="lbl">This Week</div></div>
    <div class="metric"><div class="val purple">$${costs.month.costUSD}</div><div class="lbl">This Month</div></div>
    <div class="metric"><div class="val amber">$${costs.total.costUSD}</div><div class="lbl">All Time</div></div>
  </div></div>`;

  // Cost by model
  html += `<div class="card"><h2>Cost by Model</h2><ul class="rank">`;
  for (const m of costs.byModel) html += `<li><span class="rk-name">${m.model}</span><span class="rk-val">$${m.costUSD} (${fmtI(m.calls)})</span></li>`;
  if (!costs.byModel.length) html += `<li><span class="rk-name" style="color:var(--dim)">No data yet</span><span class="rk-val"></span></li>`;
  html += `</ul></div>`;

  // Cost by endpoint
  html += `<div class="card"><h2>Cost by Endpoint</h2><ul class="rank">`;
  for (const e of costs.byEndpoint) html += `<li><span class="rk-name">${e.endpoint}</span><span class="rk-val">$${e.costUSD} (${fmtI(e.calls)})</span></li>`;
  if (!costs.byEndpoint.length) html += `<li><span class="rk-name" style="color:var(--dim)">No data yet</span><span class="rk-val"></span></li>`;
  html += `</ul></div>`;

  // Activity chart
  html += `<div class="card wide"><h2>Daily Activity (14 days)</h2><div class="bars" id="actBars">`;
  const maxTx = Math.max(1, ...activity.map(d => d.txCount));
  for (const d of activity) {
    const h = Math.max(2, Math.round(d.txCount / maxTx * 90));
    html += `<div class="bar-col"><div class="bar" style="height:${h}px" title="${d.txCount} txs"></div><div class="bar-lbl">${d.date.slice(5)}</div></div>`;
  }
  if (!activity.length) html += `<div style="color:var(--dim);padding:30px">No activity yet</div>`;
  html += `</div></div>`;

  // Financial aggregates
  html += `<div class="card"><h2>Platform Financials</h2><div class="metrics" style="flex-direction:column;gap:10px">
    <div class="metric"><div class="val green">$${fmt(fin.totalBalanceUSD)}</div><div class="lbl">Total Balances</div></div>
    <div class="metric"><div class="val purple">$${fmt(fin.totalSavingsUSD)}</div><div class="lbl">Total Savings</div></div>
    <div class="metric"><div class="val blue">$${fmt(fin.avgIncomeUSD)}</div><div class="lbl">Avg Income</div></div>
    <div class="metric"><div class="val amber">${fin.avgSavingRate}</div><div class="lbl">Avg Saving Rate</div></div>
  </div></div>`;

  // Top categories
  html += `<div class="card"><h2>Top Spending Categories</h2><ul class="rank">`;
  for (const p of fin.topPools) html += `<li><span class="rk-name">${p.name}</span><span class="rk-val">$${fmt(p.spentUSD)} (${p.users})</span></li>`;
  if (!fin.topPools.length) html += `<li><span class="rk-name" style="color:var(--dim)">No pools yet</span><span class="rk-val"></span></li>`;
  html += `</ul></div>`;

  // Engagement metrics
  html += `<div class="card wide"><h2>Engagement</h2><div class="metrics">
    <div class="metric"><div class="val blue">${fmtI(ov.totalTransactions)}</div><div class="lbl">Total Transactions</div></div>
    <div class="metric"><div class="val purple">${fmtI(ov.totalMessages)}</div><div class="lbl">Total Messages</div></div>
    <div class="metric"><div class="val green">${users.length > 0 ? (ov.totalTransactions / users.length).toFixed(1) : 0}</div><div class="lbl">Avg Txs / User</div></div>
    <div class="metric"><div class="val amber">${users.length > 0 ? (ov.totalMessages / users.length).toFixed(1) : 0}</div><div class="lbl">Avg Msgs / User</div></div>
  </div>`;
  // Language breakdown
  if (ov.languages.length) {
    html += `<div style="margin-top:16px"><h2 style="font-size:12px;color:var(--dim);margin-bottom:8px">LANGUAGE BREAKDOWN</h2>`;
    for (const l of ov.languages) {
      const pct = ov.setupUsers > 0 ? Math.round(l.count / ov.setupUsers * 100) : 0;
      html += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><span style="font-size:13px;width:30px">${l.lang.toUpperCase()}</span><div class="prog-bg" style="flex:1"><div class="prog-fill" style="width:${pct}%;background:var(--accent)"></div></div><span style="font-size:12px;color:var(--dim)">${l.count} (${pct}%)</span></div>`;
    }
    html += `</div>`;
  }
  html += `</div>`;

  // Top bills
  html += `<div class="card"><h2>Common Bills</h2><ul class="rank">`;
  for (const d of fin.topDrains) html += `<li><span class="rk-name">${d.name}</span><span class="rk-val">$${fmt(d.amountUSD)} (${d.users})</span></li>`;
  if (!fin.topDrains.length) html += `<li><span class="rk-name" style="color:var(--dim)">No bills yet</span><span class="rk-val"></span></li>`;
  html += `</ul></div>`;

  // User table
  html += `<div class="card full"><h2>All Users</h2>`;
  if (users.length) {
    html += `<div style="overflow-x:auto"><table class="tbl"><thead><tr>
      <th>ID</th><th>Telegram</th><th>Status</th><th>Lang</th><th>Balance</th><th>Income</th><th>Savings</th><th>Txs</th><th>Msgs</th><th>Created</th><th>Last Active</th>
    </tr></thead><tbody>`;
    for (const u of users) {
      const ago = timeAgo(u.lastActive);
      html += `<tr>
        <td style="font-family:monospace;font-size:11px">${u.id.slice(0,8)}...</td>
        <td>${u.telegramId || '<span style="color:var(--dim)">web</span>'}</td>
        <td><span class="badge ${u.setup?'on':'off'}">${u.setup?'Setup':'Pending'}</span></td>
        <td>${u.language.toUpperCase()}</td>
        <td>$${fmt(u.balanceUSD)}</td><td>$${fmt(u.incomeUSD)}</td><td>$${fmt(u.savingsUSD)}</td>
        <td>${u.txCount}</td><td>${u.msgCount}</td>
        <td style="font-size:12px;color:var(--dim)">${new Date(u.createdAt).toLocaleDateString()}</td>
        <td style="font-size:12px;color:var(--dim)">${ago}</td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
  } else html += `<div style="color:var(--dim);padding:20px;text-align:center">No users yet</div>`;
  html += `</div>`;

  $("#dash").innerHTML = html;
}

function kpiCard(label, value, color, sub) {
  return `<div class="card"><h2>${label}</h2><div class="big ${color}">${fmtI(value)}</div>${sub ? `<div class="sub">${sub}</div>` : ""}</div>`;
}

function timeAgo(d) {
  const s = Math.floor((Date.now() - new Date(d)) / 1000);
  if (s < 60) return "just now";
  if (s < 3600) return Math.floor(s/60) + "m ago";
  if (s < 86400) return Math.floor(s/3600) + "h ago";
  return Math.floor(s/86400) + "d ago";
}

loadAll();
setInterval(loadAll, 60000);
</script>
</body>
</html>
